<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sarah's Arts & Crafts</title>
    <style>
      :root {
        --bg: #faf7f2;
        --text: #2d2a26;
        --accent: #2c7a7b;
        --card: #ffffff;
      }

      body {
        margin: 0;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top, #fffefb, var(--bg));
      }

      main {
        max-width: 900px;
        margin: 0 auto;
        padding: 2rem 1rem 3rem;
      }

      h1 {
        margin-bottom: 0.5rem;
      }

      .intro {
        margin-bottom: 2rem;
      }

      .gallery {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }

      .card {
        background: var(--card);
        border-radius: 12px;
        padding: 0.75rem;
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
      }

      .card img {
        width: 100%;
        border-radius: 8px;
        object-fit: cover;
      }

      .hint {
        font-size: 0.95rem;
        color: #555;
      }

      a {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sarah's Arts & Crafts</h1>
      <p class="intro">
        Welcome to my little gallery of projects. More photos coming soon.
      </p>

      <section class="gallery">
        <article class="card">
          <img src="https://placehold.co/900x650?text=Your+First+Craft+Photo" alt="Placeholder for your first craft photo" />
          <p class="hint">Replace this image URL with your own photo file.</p>
        </article>
      </section>

      <p class="hint">
        Tip: upload images into this repo and reference them from <code>index.html</code>.
      </p>
    </main>
  </body>
</html>
